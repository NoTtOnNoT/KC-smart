<!DOCTYPE html>
<html lang="th">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <title>KC SMART</title>

        <link rel="preload" href="KCsmartปก.png" as="image">
        <link rel="preload" href="KCsmart.png" as="image">
        <link rel="preload" href="KClogo.png" as="image">

        <link rel="manifest" href="manifest.json">
        <link rel="stylesheet" href="style.css">

        <link rel="apple-touch-icon" href="KCsmartปก.png">
        <meta name="theme-color" content="#0a051a">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style"
            content="black-translucent">
        <meta name="mobile-web-app-capable" content="yes">

        <link
            href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap"
            rel="stylesheet">
        
        <!-- Vercel Web Analytics -->
        <script>
            window.va = window.va || function () { 
                (window.vaq = window.vaq || []).push(arguments); 
            };
        </script>
        <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
        
        <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
            .then(() => console.log("SW Registered"));
        }
    </script>
    </head>
    <body>
        <header>
            <div class="logo-wrapper">
                <h1 class="logo-title">
                    <img src="KClogo.png" class="inner-logo" alt="icon">

                    <span class="text-glow">KC SMART</span>

                    <img src="KCsmart.png" class="inner-logo" alt="icon">
                </h1>
            </div>
            <p class="school-name">Sadao Khanchai Kamphalanon Anusorn School</p>
        </header>
        <body ontouchstart></body>
        <div id="splash-screen" class="splash-screen">
            <div class="splash-content">
                <h1 class="splash-logo-title">KC SMART</h1>
                <p class="splash-school-name">Sadao Khanchai Kamphalanon
                    Anusorn</p>
                <div class="loading-spinner"></div>
            </div>
        </div>

        <div class="bg-blobs">
            <div class="blob"></div>
            <div class="blob secondary-blob"></div>
        </div>

        <main>
            <div class="app-grid" id="main-grid">
            </div>
        </main>
        <div class="special-footer">
            <a href="https://line.me/R/ti/p/@282vdaue" class="line-button"
                id="line-trigger">
                <div class="line-icon-wrapper">
                    <img
                        src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg"
                        alt="LINE">
                </div>
                <span>LINE | KC Smart</span>
            </a>

            <div id="install-container" class="install-fab-container">
                <button id="btnInstall" class="install-fab">
                    <div class="fab-icon">
                        <svg viewBox="0 0 24 24" width="24" height="24"
                            fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </div>
                </button>
            </div>

            <div class="search-container">
                <div class="search-box" id="searchBox">
                    <input type="text" class="search-input"
                        placeholder="ค้นหา KC Smart ..." id="appSearch">
                    <button class="search-btn" id="searchToggle"
                        aria-label="Search">
                        <svg viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="loading-popup" class="loading-popup">
            <div class="popup-content">
                <div class="loading-spinner"></div>
                <p class="popup-text">กรุณารอซักครู่...</p>
                <p id="target-app-name"
                    style="color: #fff; font-size: 0.8rem; margin-top: 5px; opacity: 0.7; font-weight: 300;"></p>
            </div>
        </div>
        <div id="custom-install-modal" class="modal-overlay">
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-icon-gold">
                        <svg viewBox="0 0 24 24" width="50" height="50"
                            fill="none" stroke="url(#goldGradient)"
                            stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round">
                            <defs>
                                <lineargradient id="goldGradient" x1="0%"
                                    y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%"
                                        style="stop-color:#ffd700;stop-opacity:1" />
                                    <stop offset="100%"
                                        style="stop-color:#b8860b;stop-opacity:1" />
                                </lineargradient>
                            </defs>
                            <path
                                d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </div>
                </div>
                <div class="modal-body">
                    <h3>ติดตั้ง KC SMART</h3>
                    <p>เพิ่มแอปไว้บนหน้าจอหลักเพื่อการใช้งานที่รวดเร็ว <br>
                        และดูสวยงามเหมือนแอปจริงในเครื่องคุณ</p>
                </div>
                <div class="modal-footer">
                    <button id="modal-cancel"
                        class="btn-modal-secondary">ไว้ทีหลัง</button>
                    <button id="modal-confirm"
                        class="btn-modal-primary">ติดตั้งเลย</button>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
